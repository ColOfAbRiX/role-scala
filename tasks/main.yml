---
- name: "Require Correct Linux Distribution"
  assert:
    that: ansible_distribution == 'Ubuntu' and ansible_distribution_version is version('22.0.0', '>=')
    msg: "This Linux distribution '{{ ansible_distribution }} {{ ansible_distribution_version }}' is not supported by the role."
    quiet: true
  tags: scala

- name: Unarchive Scala to /opt
  ansible.builtin.unarchive:
    src: "https://github.com/scala/scala3/releases/download/{{ scala_version }}/scala3-{{ scala_version }}.tar.gz"
    dest: /opt
    remote_src: yes
    creates: "/opt/scala3-{{ scala_version }}"
  tags: scala

- name: Create symlinks in /usr/local/bin
  ansible.builtin.file:
    src: "/opt/scala3-{{ scala_version }}/bin/{{ item }}"
    dest: "/usr/local/bin/{{ item }}"
    state: link
  loop:
    - scala
    - scalac
    - scaladoc
  tags: scala

##  Ammonite  ##

- name: "Set Ammonite URLs"
  set_fact:
    ammonite_url: "https://github.com/lihaoyi/Ammonite/releases/download/{{ scala_ammonite_version }}/{{ scala_version | regex_replace('\\.\\d+$', '') }}-{{ scala_ammonite_version }}"
  when: scala_ammonite_install | default(False) | bool
  tags: scala

- name: "Check Ammonite executable"
  stat:
    path: /usr/local/bin/amm
  register: ammonite_exec_check
  when: scala_ammonite_install | default(False) | bool
  tags: scala

- name: "Install Ammonite"
  block:
    - name: "Download Ammonite"
      get_url:
        url: "{{ ammonite_url }}"
        dest: /usr/local/bin/amm
        validate_certs: false
        owner: root
        group: root
        mode: "0755"

    - name: "Ammonite Directory"
      become: false
      file:
        path: ~/.ammonite
        state: directory

    - name: "Ammonite Configuration"
      become: false
      template:
        src: ammonite_predef.sc.j2
        dest: ~/.ammonite/predef.sc

  when: not ammonite_exec_check.stat.exists and
    scala_ammonite_install | default(False) | bool
  tags: scala
