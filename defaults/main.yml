---
# defaults file for scala

# Scala
scala_version: 3.8.2
scala_force_install: false

# SBT
scala_sbt_install: true

scala_sbt_users: []
#  - username: fabrizio
#    sbt_sonatype:
#      username: sona_fabrizio
#      password: Passw0rd

scala_sbt_global_opts: ""
scala_sbt_global_config_extra: ""
scala_sbt_global_config: |
  credentials += Credentials(Path.userHome / ".sbt" / "sonatype_central_credentials")
  {{ scala_sbt_global_config_extra | default(omit) }}

# Ammonite
scala_ammonite_version: 3.0.8
scala_ammonite_force_install: false
